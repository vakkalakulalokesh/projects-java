name: api-gateway

services:
  gateway-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - gateway-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gateway_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5674:5672"
      - "15674:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://gateway-postgres:5432/gateway_db
      SPRING_RABBITMQ_HOST: gateway-rabbitmq
      SPRING_DATA_REDIS_HOST: gateway-redis
    depends_on:
      gateway-postgres:
        condition: service_healthy
      gateway-rabbitmq:
        condition: service_healthy
      gateway-redis:
        condition: service_healthy

volumes:
  gateway-pgdata:
